<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" role="img" aria-label="Phronesis CSO architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="55%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="sh" x="-6%" y="-8%" width="112%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.15"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#d97706" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { fill:#1e293b; font-family:'Inter',system-ui,sans-serif; }
      .bold { font-weight:700; }
      .reg  { font-weight:400; }
      .mono { font-family:'JetBrains Mono','Fira Code',monospace; }
      .dim  { fill:#475569; }
      .mute { fill:#64748b; }
      .node { fill:url(#nodeGrad); stroke:#e2e8f0; stroke-width:1.4; filter:url(#sh); }
      .wire { fill:none; stroke:#94a3b8; stroke-width:1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1180" height="600" fill="url(#bg)" rx="14"/>

  <!-- Title bar -->
  <text x="590" y="31" class="bold" font-size="14" text-anchor="middle" fill="#0f172a">Phronesis CSO - Multi-Agent Target Assessment Architecture</text>
  <line x1="40" y1="42" x2="1140" y2="42" stroke="#e2e8f0" stroke-width="1"/>

  <!-- INPUT QUERY -->
  <rect class="node" x="34" y="116" width="118" height="74" rx="11"/>
  <text x="93" y="139" class="mono mute" font-size="9" text-anchor="middle">INPUT QUERY</text>
  <text x="93" y="157" class="reg" font-size="10.5" text-anchor="middle">"Assess B7-H3</text>
  <text x="93" y="171" class="reg" font-size="10.5" text-anchor="middle">in lung cancer"</text>
  <line class="wire" x1="152" y1="153" x2="196" y2="153" marker-end="url(#arr)"/>

  <!-- CSO ORCHESTRATOR (entry) -->
  <rect class="node" x="198" y="116" width="122" height="74" rx="11" stroke="#10b981" stroke-width="1.8" stroke-opacity="0.65"/>
  <circle cx="228" cy="142" r="9" fill="none" stroke="#10b981" stroke-width="1.6"/>
  <circle cx="228" cy="142" r="3.5" fill="#10b981"/>
  <text x="248" y="138" class="bold" font-size="12.5" fill="#065f46">CSO</text>
  <text x="248" y="152" class="dim reg" font-size="8.5">orchestrator</text>
  <text x="259" y="178" class="mute mono" font-size="8" text-anchor="middle">clarify - plan - route</text>

  <!-- Fork to Chief of Staff and Planning -->
  <line class="wire" x1="320" y1="138" x2="362" y2="94" marker-end="url(#arr)"/>
  <line class="wire" x1="320" y1="168" x2="362" y2="212" marker-end="url(#arr)"/>

  <rect class="node" x="364" y="68" width="152" height="52" rx="10"/>
  <text x="440" y="89" class="bold" font-size="11" text-anchor="middle" fill="#1e40af">Chief of Staff</text>
  <text x="440" y="105" class="mute reg" font-size="8.5" text-anchor="middle">briefing + scouting</text>

  <rect class="node" x="364" y="186" width="152" height="52" rx="10"/>
  <text x="440" y="207" class="bold" font-size="11" text-anchor="middle" fill="#1e40af">Planning</text>
  <text x="440" y="223" class="mute reg" font-size="8.5" text-anchor="middle">decompose + route</text>

  <!-- Merge back to CSO Router -->
  <line class="wire" x1="516" y1="94" x2="558" y2="140" marker-end="url(#arr)"/>
  <line class="wire" x1="516" y1="212" x2="558" y2="166" marker-end="url(#arr)"/>
  <rect class="node" x="560" y="124" width="58" height="58" rx="11" stroke="#10b981" stroke-width="1.8" stroke-opacity="0.65"/>
  <circle cx="589" cy="150" r="9" fill="none" stroke="#10b981" stroke-width="1.6"/>
  <circle cx="589" cy="150" r="3.5" fill="#10b981"/>
  <text x="589" y="174" class="bold" font-size="10" text-anchor="middle" fill="#065f46">CSO</text>

  <!-- Fan-out to four divisions -->
  <path class="wire" d="M618 153 H650" marker-end="url(#arr)"/>
  <line class="wire" x1="650" y1="153" x2="650" y2="73"/>
  <line class="wire" x1="650" y1="153" x2="650" y2="235"/>
  <path class="wire" d="M650 73  H692" marker-end="url(#arr)"/>
  <path class="wire" d="M650 127 H692" marker-end="url(#arr)"/>
  <path class="wire" d="M650 179 H692" marker-end="url(#arr)"/>
  <path class="wire" d="M650 235 H692" marker-end="url(#arr)"/>

  <!-- Four Divisions -->
  <rect class="node" x="694" y="52" width="200" height="42" rx="9" stroke="#10b981" stroke-opacity="0.5"/>
  <rect x="702" y="64" width="5" height="18" rx="2.5" fill="#10b981"/>
  <text x="718" y="73" class="bold" font-size="10.5" fill="#064e3b">Target ID &amp; Prioritization</text>
  <text x="718" y="86" class="mute mono" font-size="7.5">GWAS - scRNA - CRISPR dependency</text>

  <rect class="node" x="694" y="107" width="200" height="42" rx="9" stroke="#0284c7" stroke-opacity="0.5"/>
  <rect x="702" y="119" width="5" height="18" rx="2.5" fill="#0284c7"/>
  <text x="718" y="128" class="bold" font-size="10.5" fill="#0c4a6e">Target Safety</text>
  <text x="718" y="141" class="mute mono" font-size="7.5">off-target - mouse-KO - FAERS</text>

  <rect class="node" x="694" y="162" width="200" height="42" rx="9" stroke="#0284c7" stroke-opacity="0.5"/>
  <rect x="702" y="174" width="5" height="18" rx="2.5" fill="#0284c7"/>
  <text x="718" y="183" class="bold" font-size="10.5" fill="#0c4a6e">Modality &amp; Tractability</text>
  <text x="718" y="196" class="mute mono" font-size="7.5">druggability - structure - ChEMBL</text>

  <rect class="node" x="694" y="217" width="200" height="42" rx="9" stroke="#d97706" stroke-opacity="0.5"/>
  <rect x="702" y="229" width="5" height="18" rx="2.5" fill="#d97706"/>
  <text x="718" y="238" class="bold" font-size="10.5" fill="#78350f">Clinical &amp; Literature</text>
  <text x="718" y="251" class="mute mono" font-size="7.5">trials - Tavily live web search</text>

  <!-- Merge to reviewer -->
  <line class="wire" x1="894" y1="73"  x2="924" y2="73"/>
  <line class="wire" x1="894" y1="128" x2="924" y2="128"/>
  <line class="wire" x1="894" y1="182" x2="924" y2="182"/>
  <line class="wire" x1="894" y1="238" x2="924" y2="238"/>
  <line class="wire" x1="924" y1="73"  x2="924" y2="238"/>
  <path class="wire" d="M924 155 H954" marker-end="url(#arr)"/>

  <!-- Scientific Reviewer -->
  <rect class="node" x="956" y="118" width="94" height="74" rx="11" stroke="#d97706" stroke-width="1.8" stroke-opacity="0.65"/>
  <circle cx="1003" cy="142" r="9" fill="none" stroke="#d97706" stroke-width="1.6"/>
  <circle cx="1003" cy="142" r="3.5" fill="#d97706"/>
  <text x="1003" y="171" class="bold" font-size="10" text-anchor="middle" fill="#78350f">Reviewer</text>
  <text x="1003" y="107" class="mute reg" font-size="8" text-anchor="middle">4 lenses - majority vote</text>

  <!-- Reviewer to CSO synthesis -->
  <path class="wire" d="M1050 155 H1062" marker-end="url(#arr)"/>
  <rect class="node" x="1064" y="124" width="58" height="58" rx="11" stroke="#10b981" stroke-width="1.8" stroke-opacity="0.65"/>
  <circle cx="1093" cy="150" r="9" fill="none" stroke="#10b981" stroke-width="1.6"/>
  <circle cx="1093" cy="150" r="3.5" fill="#10b981"/>
  <text x="1093" y="174" class="bold" font-size="9.5" text-anchor="middle" fill="#065f46">CSO</text>
  <text x="1093" y="112" class="mute reg" font-size="8" text-anchor="middle">synthesis</text>

  <!-- CSO to verdict -->
  <path class="wire" d="M1122 153 H1134" marker-end="url(#arr)"/>
  <rect class="node" x="1136" y="124" width="46" height="58" rx="9" stroke="#10b981" stroke-opacity="0.5"/>
  <circle cx="1159" cy="143" r="6" fill="#d97706"/>
  <text x="1159" y="168" class="bold" font-size="8.5" text-anchor="middle" fill="#064e3b">GO /</text>
  <text x="1159" y="179" class="bold" font-size="8.5" text-anchor="middle" fill="#064e3b">NO-GO</text>

  <!-- RE-ROUTE LOOP (dashed amber arc) -->
  <path d="M1003 192 C 1003 310 760 310 589 310 C 440 310 320 310 258 310 L258 192"
        fill="none" stroke="#d97706" stroke-width="1.8" stroke-dasharray="7 5"
        marker-end="url(#arrLoop)"/>
  <rect x="476" y="296" width="226" height="26" rx="13" fill="#fffbeb" stroke="#d97706" stroke-opacity="0.5"/>
  <text x="589" y="313" class="mono" font-size="10" fill="#92400e" text-anchor="middle">re-route to fill missing gaps</text>

  <!-- LOWER RAIL 1: Expert tools -->
  <line x1="40" y1="376" x2="1140" y2="376" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="52" cy="398" r="4" fill="#0284c7"/>
  <text x="68" y="402" class="bold" font-size="11.5" fill="#0c4a6e">Expert tools over real databases</text>
  <text x="356" y="402" class="dim reg" font-size="10"> - each division calls deterministic ClawBio skills; every claim is grounded.</text>
  <text x="68" y="422" class="mono dim" font-size="9.5">Open Targets - CELLxGENE Census - TCGA/GDC - DepMap CRISPR - GWAS Catalog - openFDA/FAERS - ClinicalTrials.gov - Tavily</text>
  <text x="68" y="440" class="mono mute" font-size="9">validation: tau-specificity - malignant localisation - structure - CRISPR dependency - mouse-KO - trial outcomes</text>

  <!-- LOWER RAIL 2: Reasoning store -->
  <line x1="40" y1="464" x2="1140" y2="464" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="52" cy="486" r="4" fill="#d97706"/>
  <text x="68" y="490" class="bold" font-size="11.5" fill="#78350f">Verifiable reasoning store</text>
  <text x="300" y="490" class="dim reg" font-size="10"> - verdict derived deductively from cited facts; every span is replayable.</text>

  <!-- Three store boxes -->
  <rect class="node" x="64" y="506" width="346" height="66" rx="10" stroke="#10b981" stroke-opacity="0.4"/>
  <text x="82" y="529" class="bold" font-size="11" fill="#064e3b">Canonical knowledge graph</text>
  <text x="82" y="545" class="mono mute" font-size="8.5">kg.py - kg.json</text>
  <text x="82" y="561" class="dim reg" font-size="9.5">cited edges: confidence - axis - grade - source URL - step</text>

  <rect class="node" x="420" y="506" width="346" height="66" rx="10" stroke="#d97706" stroke-opacity="0.4"/>
  <text x="438" y="529" class="bold" font-size="11" fill="#78350f">Vadalog reasoning engine</text>
  <text x="438" y="545" class="mono mute" font-size="8.5">prometheux_reason.py - Prometheux</text>
  <text x="438" y="561" class="dim reg" font-size="9.5">derives GO/NO-GO with @explain rule chains</text>

  <rect class="node" x="776" y="506" width="346" height="66" rx="10" stroke="#0284c7" stroke-opacity="0.4"/>
  <text x="794" y="529" class="bold" font-size="11" fill="#0c4a6e">Execution trace</text>
  <text x="794" y="545" class="mono mute" font-size="8.5">tracing.py - trace.jsonl (optional Langfuse)</text>
  <text x="794" y="561" class="dim reg" font-size="9.5">every span replayable - run is inspectable, not just result</text>
</svg>